services:
  postgres:
    image: postgres:16-alpine
    container_name: taskhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskhub
      POSTGRES_PASSWORD: taskhub
      POSTGRES_DB: taskhub
    ports:
      - "5432:5432"
    volumes:
      - taskhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhub"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  taskhub_pgdata:
